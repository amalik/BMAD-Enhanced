gyre_findings:
  version: "1.0"
  analyzed_at: "2026-03-25T00:00:00Z"
  mode: "crisis"
  stack_summary: "Node.js npm package (convoke-agents) — CLI toolkit with agent definitions, distributed via npm, CI/CD via GitHub Actions. Secondary Python stack (33% of codebase) powers builder/quality toolchain."
  summary:
    blockers: 1
    recommended: 4
    nice_to_have: 2
    total: 7
    novelty_ratio: "6 of 7 new (model expansion)"
  findings:
    # === CARRIED from previous analysis ===
    - id: "OBS-001"
      domain: "observability"
      severity: "recommended"
      source: "static-analysis"
      confidence: "high"
      capability_ref: "verbose-debug-mode"
      description: "Verbose/debug output mode is only available in convoke-update (--verbose / -v flag). Other CLI commands (convoke-install, convoke-doctor, convoke-migrate, convoke-version) do not support verbose output, making it harder to troubleshoot issues in those commands."
      evidence_summary: "Grep for '--verbose', 'verbose', '-v' across all CLI entry points. Found in convoke-update.js (line 73: args.includes('--verbose')), refresh-installation.js (verbose param with per-action logging). No verbose support found in convoke-doctor.js, install-vortex-agents.js, install-gyre-agents.js, convoke-migrate.js, or convoke-version.js."
      severity_rationale: "Recommended, not blocker. The most complex operation (update/migration) already supports verbose. Install and doctor commands would benefit from verbose output for troubleshooting file copy operations, but their output is already reasonably informative."

    # === NEW — Dual-language findings ===
    - id: "DL-001"
      domain: "reliability"
      severity: "blocker"
      source: "static-analysis"
      confidence: "high"
      capability_ref: "python-ci-testing"
      description: "46 Python files with local tests (pytest/unittest) exist across BMB and Core modules, but CI pipeline (ci.yml) only runs Node.js tests (npm test, npm run test:integration). Python test failures are completely invisible to CI — regressions in builder scripts, config merging, legacy cleanup, and distillation are only caught if a developer runs tests locally."
      evidence_summary: "ci.yml contains zero Python steps — no setup-python, no pip install, no pytest. Python test files confirmed in: bmad-builder-setup (3 test files), bmad-distillator (1 test file), bmad-init (1 test file). All use pytest/unittest patterns. None are executed by any CI job."
      severity_rationale: "Blocker. Python scripts power the builder toolchain that constructs agents and workflows. A regression in merge-config.py or cleanup-legacy.py would silently produce malformed outputs. The 33% Python codebase has zero CI safety net."

    - id: "DL-002"
      domain: "deployment"
      severity: "recommended"
      source: "static-analysis"
      confidence: "high"
      capability_ref: "python-linting"
      description: "No Python linter (ruff, flake8, pylint, mypy) is configured for the project. 46 Python files across BMB and Core modules have no automated style enforcement or static analysis, while JavaScript has ESLint enforced in CI."
      evidence_summary: "Grep for ruff, flake8, pylint, mypy, black, isort found zero configuration files. No .flake8, ruff.toml, pyproject.toml, setup.cfg, or tox.ini with linting config. Only contextual mentions in brainstorming workflow docs and scan-scripts.py (which scans for linter usage in OTHER projects, not this one)."
      severity_rationale: "Recommended. Style drift in Python scripts is a maintenance risk but not a correctness issue. The JS side has ESLint — parity would be ideal but absence isn't blocking."

    - id: "DL-003"
      domain: "security"
      severity: "nice-to-have"
      source: "static-analysis"
      confidence: "high"
      capability_ref: "python-dependency-management"
      description: "Python scripts use PEP 723 inline metadata to declare dependencies per-script — a sound modern approach. Only external dep is pyyaml. However, CI does not consume these declarations (no pip install step), no vulnerability scanning covers pyyaml, and version pinning is inconsistent (some say 'pyyaml', others 'pyyaml>=6.0')."
      evidence_summary: "PEP 723 '# /// script' blocks found in merge-config.py, cleanup-legacy.py, merge-help-csv.py, bmad_init.py, analyze_sources.py, prepass-structure-capabilities.py, and their test files. Only external dep is pyyaml. No requirements.txt or pyproject.toml needed — per-script declarations are sufficient. Gap is CI integration and version consistency."
      severity_rationale: "Nice-to-have (revised from recommended). PEP 723 inline metadata provides per-script dependency management. The gap is limited to CI consumption of those declarations and pyyaml version pinning consistency."

    # === NEW — Agent framework findings ===
    - id: "AF-001"
      domain: "reliability"
      severity: "recommended"
      source: "contextual-model"
      confidence: "medium"
      capability_ref: "agent-definition-integrity"
      description: "convoke-doctor validates agent count (expected vs actual) but does not validate agent file content — missing frontmatter, malformed XML agent blocks, or incomplete activation steps are not detected."
      evidence_summary: "validator.js validateManifest() checks that AGENT_IDS appear in agent-manifest.csv content (line 206: manifestContent.includes(id)). No function reads or parses individual agent .md files for structural validity. A syntactically broken agent file passes all current validation."
      severity_rationale: "Recommended. Agent files are the runtime payload but corruption is rare — they're copied from a known-good source during install/update. Risk increases if users manually edit agent files."

    - id: "AF-002"
      domain: "reliability"
      severity: "nice-to-have"
      source: "contextual-model"
      confidence: "medium"
      capability_ref: "contract-schema-compliance"
      description: "Handoff contract artifacts (GC1-GC4 for Gyre, HC1-HC10 for Vortex) are not validated against their contract schemas at runtime or in CI. A malformed artifact passes silently to downstream agents."
      evidence_summary: "Contract schemas exist as markdown (contracts/ directories). No script, test, or CI job validates that .gyre/*.yaml or vortex artifact files conform to their contract schemas. Grep for 'contract.*schema', 'validate.*contract' across scripts/ found zero matches."
      severity_rationale: "Nice-to-have. Contracts are currently produced by agents (LLM output) and consumed by agents. Schema violations would likely be caught by the consuming agent's prompts. Formal validation adds safety but the current agent-to-agent flow is self-correcting."

    - id: "AF-003"
      domain: "reliability"
      severity: "recommended"
      source: "contextual-model"
      confidence: "medium"
      capability_ref: "manifest-sync"
      description: "Manifest consistency is partially validated — validator.js checks that expected agent IDs appear in agent-manifest.csv, but does not verify the reverse (no orphan detection) and does not cross-check against config.yaml agent lists or filesystem agent files."
      evidence_summary: "validator.js line 206 does a one-directional check: AGENT_IDS.filter(id => !manifestContent.includes(id)). No reverse check for rows in CSV that don't match any known agent. No cross-reference to config.yaml agents arrays. refresh-installation.js regenerates the CSV on update, which provides implicit sync — but between updates, drift is undetected."
      severity_rationale: "Recommended. refresh-installation.js regenerates manifests on update, providing a strong implicit sync mechanism. But between updates — especially after Team Factory generates a new team — drift can occur undetected until the next update cycle."

  compound_findings:
    - id: "COMPOUND-001"
      severity: "recommended"
      related_findings: ["DL-001", "DL-003"]
      description: "Python scripts declare deps via PEP 723 but CI doesn't consume them (DL-003) and doesn't run Python tests (DL-001). A new non-stdlib import would be declared in the script but never installed in CI — tests would pass locally (where the dep is installed) but the CI gap means no automated verification. Severity reduced from blocker because PEP 723 declarations exist — the gap is CI integration, not missing declarations."

  sanity_check:
    passed: true
    warnings: []
